<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space - Orbital Mechanics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; touch-action: none; }
        
        #hud, #data-overlay {
            position: absolute;
            color: #888da8;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 10;
        }

        #hud {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid #2a2a35;
            padding: 10px 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value { color: #fff; font-weight: bold; margin-left: 5px; }

        #data-overlay {
            bottom: 30px;
            left: 30px;
            font-size: 11px;
            line-height: 1.4;
        }

        #planet-popup {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.95);
            border: 2px solid #0ff;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            color: white;
            display: none;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            z-index: 100;
        }

        #planet-popup h3 { 
            margin: 10px 0; 
            color: #0ff; 
            letter-spacing: 3px; 
            font-size: 24px;
        }
        
        .share-btn {
            margin-top: 15px;
            background: #0ff;
            border: none;
            color: #000;
            padding: 18px 25px;
            font-family: inherit;
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .share-btn:active { transform: scale(0.95); background: #fff; }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .social-btn {
            padding: 15px;
            font-size: 11px;
            font-weight: bold;
            background: #2a2a35;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .social-btn:active { background: #444; }
        
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0ff;
            color: #000;
            padding: 15px 25px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            display: none;
            z-index: 4000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #screenshot-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        #preview-img {
            max-width: 100%;
            max-height: 40%;
            border: 3px solid #0ff;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .exit-x {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #0ff;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
            padding: 5px;
            line-height: 1;
        }
        .exit-x:hover { color: #fff; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            background: rgba(255,255,255,0.1);
            border: 1px solid #fff;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            pointer-events: auto;
        }
        
        .guide-text {
            color: #888;
            font-size: 10px;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="toast">SYSTEM: ACTION COMPLETE</div>

<div id="data-overlay">
    STAR: MARSHMALLOW^M (TM-41126)<br>
    STATUS: GRAVITY WELL ACTIVE<br>
    SENSORS: VECTOR OVERLAY ENABLED<br>
    BODIES: <span id="bodies-count">0 / 9</span>
</div>

<div id="hud">
    <div class="stat-box">VEL:<span id="vel" class="stat-value">0.0</span></div>
    <div class="stat-box">POWER:<span id="power" class="stat-value">0%</span></div>
    <div class="stat-box">COORD:<span id="coord" class="stat-value">0,0</span></div>
</div>

<div id="planet-popup">
    <div class="exit-x" onclick="closePopups()">✕</div>
    <div id="planet-icon" style="font-size: 50px; margin-bottom: 5px; margin-top: 10px;">🪐</div>
    <h3 id="planet-name"></h3>
    <p id="planet-desc" style="font-size: 14px; color: #aaa; line-height: 1.5;"></p>
    
    <button class="share-btn" onclick="captureAndShow()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        TAKE SCREENSHOT
    </button>
</div>

<div id="screenshot-overlay">
    <div class="exit-x" style="top: 20px; right: 25px; font-size: 30px;" onclick="closePopups()">✕</div>
    <h2 style="color: #0ff; margin-bottom: 15px; letter-spacing: 2px; text-align: center;">LOG ENTRY CAPTURED</h2>
    <img id="preview-img" alt="Planet Screenshot">
    
    <div style="display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="share-btn" style="padding: 15px; margin-top: 0; font-size: 12px;" onclick="downloadImage()">💾 SAVE LOG</button>
            <button class="share-btn" style="padding: 15px; margin-top: 0; font-size: 12px; background: #fff; color: #000;" onclick="copyImageToClipboard()">📋 COPY IMAGE</button>
        </div>
        
        <div class="social-grid" style="margin-top: 0;">
            <button class="social-btn" style="background: #0077b5;" onclick="shareSocial('linkedin')">LinkedIn</button>
            <button class="social-btn" style="background: #E1306C;" onclick="shareSocial('instagram')">Instagram</button>
            <button class="social-btn" style="background: #000; border: 1px solid #ff0050; grid-column: span 2;" onclick="shareSocial('tiktok')">Post on TikTok</button>
        </div>
        <p class="guide-text" style="text-align: center;">1. Copy caption/image & Save log <br> 2. Open app and post your discovery</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const planetPopup = document.getElementById("planet-popup");
const pName = document.getElementById("planet-name");
const pDesc = document.getElementById("planet-desc");
const toast = document.getElementById("toast");
const screenshotOverlay = document.getElementById("screenshot-overlay");
const previewImg = document.getElementById("preview-img");

let isPaused = false;
let currentSnapshotBlob = null;

// Physics Constants
const G_CONSTANT = 0.12; 
const MAX_THRUST_DIST = 300;
const MAX_THRUST_FORCE = 0.8;
const TERMINAL_VELOCITY = 25; 
const LANDING_SPEED_THRESHOLD = 4.2;
const BREAKOUT_THRUST_LIMIT = 0.2;

const planetData = [
    { name: "Java", desc: "Robust enterprise backend and high-scale systems.", icon: "☕" },
    { name: "Python", desc: "The language of AI and data science worldwide.", icon: "🐍" },
    { name: "JavaScript", desc: "Powering the modern interactive web experience.", icon: "📜" },
    { name: "C++", desc: "Extreme performance for games and low-level systems.", icon: "⚙️" },
    { name: "C#", desc: "The backbone of Unity and modern Windows apps.", icon: "🎮" },
    { name: "Go", desc: "Designed for simple, reliable cloud infrastructure.", icon: "🐹" },
    { name: "Rust", desc: "The future of safe and blazing fast systems.", icon: "🦀" },
    { name: "Kotlin", desc: "Modern, concise development for Android devices.", icon: "📱" },
    { name: "TypeScript", desc: "Bringing safety and scale to JavaScript apps.", icon: "🛡️" }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Controls {
    constructor() {
        this.mouse = { x: 0, y: 0, isDown: false };
        window.addEventListener("mousemove", e => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; });
        window.addEventListener("mousedown", () => { if(!isPaused) this.mouse.isDown = true; });
        window.addEventListener("mouseup", () => { this.mouse.isDown = false; });
        window.addEventListener("touchstart", e => {
            if(isPaused) return;
            const t = e.touches[0];
            this.mouse.x = t.clientX; this.mouse.y = t.clientY;
            this.mouse.isDown = true;
        });
        window.addEventListener("touchend", () => { this.mouse.isDown = false; });
    }
}

class Particle {
    constructor(x, y, vx, vy) {
        this.x = x; this.y = y;
        this.vx = vx * 0.4 + (Math.random()-0.5);
        this.vy = vy * 0.4 + (Math.random()-0.5);
        this.life = 1.0;
        this.size = 2 + Math.random() * 4;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.015;
    }
    draw(ctx, camera) {
        ctx.strokeStyle = `rgba(150, 150, 180, ${this.life * 0.5})`;
        ctx.beginPath();
        ctx.arc(this.x - camera.x, this.y - camera.y, this.size, 0, Math.PI * 2);
        ctx.stroke();
    }
}

class Player {
    constructor(x, y) {
        this.x = x; this.y = y; this.vx = 0; this.vy = 0;
        this.radius = 10; this.direction = 0;
        this.controls = new Controls();
        this.particles = [];
        this.thrust = 0;
        this.landedOn = null; 
    }

    update(planets, sun) {
        if (isPaused) return;

        const dx = this.controls.mouse.x - canvas.width / 2;
        const dy = this.controls.mouse.y - canvas.height / 2;
        const dist = Math.hypot(dx, dy);
        this.direction = Math.atan2(dy, dx);

        if (this.controls.mouse.isDown) {
            this.thrust = Math.min(dist / MAX_THRUST_DIST, 1);
            const force = this.thrust * MAX_THRUST_FORCE;
            
            this.vx += Math.cos(this.direction) * force;
            this.vy += Math.sin(this.direction) * force;
            
            if (this.landedOn && this.thrust > BREAKOUT_THRUST_LIMIT) {
                this.landedOn = null;
                planetPopup.style.display = "none";
                this.vx += Math.cos(this.direction) * 3.5;
                this.vy += Math.sin(this.direction) * 3.5;
            }
            
            if (Math.random() > 0.4) {
                this.particles.push(new Particle(this.x, this.y, -Math.cos(this.direction)*2.5, -Math.sin(this.direction)*2.5));
            }
        } else {
            this.thrust = 0;
        }

        const bodies = [sun, ...planets];
        let claimedCount = 0;
        
        bodies.forEach(p => {
            const pdx = p.x - this.x;
            const pdy = p.y - this.y;
            const distToBody = Math.hypot(pdx, pdy);
            const angle = Math.atan2(pdy, pdx);

            if (this.landedOn !== p) {
                const force = (G_CONSTANT * p.mass) / Math.max(distToBody * distToBody, 400);
                this.vx += Math.cos(angle) * force;
                this.vy += Math.sin(angle) * force;
            }

            const minP = this.radius + p.radius;
            if (distToBody < minP) {
                const currentSpeed = Math.hypot(this.vx, this.vy);
                if (currentSpeed < LANDING_SPEED_THRESHOLD && p.id !== 'sun') {
                    if (!this.landedOn) {
                        this.landedOn = p;
                        p.hasFlag = true;
                        this.vx = 0; this.vy = 0;
                        showPlanetData(p);
                    }
                } else if (this.landedOn !== p) {
                    const nx = pdx / distToBody; const ny = pdy / distToBody;
                    this.x = p.x - nx * minP;
                    this.y = p.y - ny * minP;
                    const dot = this.vx * nx + this.vy * ny;
                    this.vx = (this.vx - 2 * dot * nx) * 0.3;
                    this.vy = (this.vy - 2 * dot * ny) * 0.3;
                }
            }
            if (p.hasFlag) claimedCount++;
        });

        if (this.landedOn) {
            const p = this.landedOn;
            const angleToBody = Math.atan2(this.y - p.y, this.x - p.x);
            const surfaceDist = p.radius + this.radius;
            this.x = p.x + Math.cos(angleToBody) * surfaceDist;
            this.y = p.y + Math.sin(angleToBody) * surfaceDist;
        } else {
            this.x += this.vx;
            this.y += this.vy;
            const currentSpeed = Math.hypot(this.vx, this.vy);
            if (currentSpeed > TERMINAL_VELOCITY) {
                this.vx *= 0.98; this.vy *= 0.98;
            }
        }

        this.particles.forEach(p => p.update());
        this.particles = this.particles.filter(p => p.life > 0);

        const currentSpeedVal = Math.hypot(this.vx, this.vy);
        document.getElementById("vel").innerText = currentSpeedVal.toFixed(1);
        document.getElementById("power").innerText = Math.round(this.thrust * 100) + "%";
        document.getElementById("coord").innerText = `${Math.floor(this.x)},${Math.floor(this.y)}`;
        document.getElementById("bodies-count").innerText = `${claimedCount} / 9`;
    }

    draw(ctx, camera) {
        this.particles.forEach(p => p.draw(ctx, camera));
        const shipScreenX = canvas.width / 2;
        const shipScreenY = canvas.height / 2;

        // Visual Guidance System (Interaction Overlay)
        if (this.controls.mouse.isDown && !isPaused) {
            // Thrust Intent Vector Line (dashed)
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
            ctx.beginPath();
            ctx.moveTo(shipScreenX, shipScreenY);
            ctx.lineTo(this.controls.mouse.x, this.controls.mouse.y);
            ctx.stroke();
            ctx.setLineDash([]);

            // Target Point Circle
            ctx.strokeStyle = "#0ff";
            ctx.beginPath();
            ctx.arc(this.controls.mouse.x, this.controls.mouse.y, 5 + Math.sin(Date.now()*0.01)*2, 0, Math.PI * 2);
            ctx.stroke();

            // Magnitude Power Ring
            ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
            ctx.beginPath();
            ctx.arc(shipScreenX, shipScreenY, MAX_THRUST_DIST * this.thrust, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Persistent Velocity Vector Line
        const currentSpeed = Math.hypot(this.vx, this.vy);
        if (currentSpeed > 0.1) {
            ctx.strokeStyle = "#4da6ff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(shipScreenX, shipScreenY);
            // Length scales with velocity
            const vectorScale = 8;
            ctx.lineTo(shipScreenX + this.vx * vectorScale, shipScreenY + this.vy * vectorScale);
            ctx.stroke();
            
            // Vector Arrow Head
            const vAngle = Math.atan2(this.vy, this.vx);
            ctx.save();
            ctx.translate(shipScreenX + this.vx * vectorScale, shipScreenY + this.vy * vectorScale);
            ctx.rotate(vAngle);
            ctx.fillStyle = "#4da6ff";
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-6, -3);
            ctx.lineTo(-6, 3);
            ctx.fill();
            ctx.restore();
            ctx.lineWidth = 1;
        }

        // Direction Indicator Ring
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.beginPath();
        ctx.arc(shipScreenX, shipScreenY, 25, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.strokeStyle = "#0ff";
        ctx.beginPath();
        ctx.arc(shipScreenX + Math.cos(this.direction) * 25, shipScreenY + Math.sin(this.direction) * 25, 2, 0, Math.PI * 2);
        ctx.stroke();

        ctx.save();
        ctx.translate(shipScreenX, shipScreenY);
        ctx.rotate(this.direction + Math.PI / 2);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, 8, Math.PI, 0); 
        ctx.lineTo(8, 10); ctx.lineTo(-8, 10);
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = this.thrust > 0 ? "#0ff" : (this.landedOn ? "#0f0" : "#333");
        ctx.fillRect(-2, 4, 4, 4);
        ctx.restore();
    }
}

function showPlanetData(p) {
    isPaused = true;
    document.getElementById("planet-icon").innerText = p.icon;
    pName.innerText = p.name;
    pDesc.innerText = p.description;
    planetPopup.style.display = "block";
}

function captureAndShow() {
    planetPopup.style.display = "none";
    document.getElementById("hud").style.opacity = "0";
    document.getElementById("data-overlay").style.opacity = "0";
    
    setTimeout(() => {
        draw(); 
        ctx.fillStyle = "rgba(0, 255, 255, 0.8)";
        ctx.font = "bold 24px Courier New";
        ctx.textAlign = "right";
        ctx.fillText(`PLANET ${pName.innerText.toUpperCase()}`, canvas.width - 40, 60);
        ctx.font = "14px Courier New";
        ctx.fillText(pDesc.innerText, canvas.width - 40, 85);
        ctx.fillText("DEVSOC SPACE EXPLORER", canvas.width - 40, 110);

        const dataURL = canvas.toDataURL("image/png");
        previewImg.src = dataURL;
        
        canvas.toBlob(blob => {
            currentSnapshotBlob = blob;
        }, 'image/png');

        screenshotOverlay.style.display = "flex";
        
        document.getElementById("hud").style.opacity = "1";
        document.getElementById("data-overlay").style.opacity = "1";
        showToast("SNAPSHOT GENERATED");
    }, 100);
}

async function copyImageToClipboard() {
    if (!currentSnapshotBlob) {
        showToast("ERROR: NO IMAGE DATA");
        return;
    }
    try {
        const item = new ClipboardItem({ "image/png": currentSnapshotBlob });
        await navigator.clipboard.write([item]);
        showToast("IMAGE COPIED TO CLIPBOARD!");
    } catch (err) {
        console.error(err);
        showToast("CLIPBOARD ACCESS DENIED");
    }
}

function shareSocial(platform) {
    const url = window.location.href;
    const text = `🚀 I've discovered Planet ${pName.innerText} in DevSoc Space! ${pDesc.innerText}\n\nExplore with me: ${url}\n\n#DevSoc #SpaceExploration`;
    
    if (platform === 'linkedin') {
        const shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}&summary=${encodeURIComponent(text)}`;
        window.open(shareUrl, '_blank');
        showToast("PRE-FILLING LINKEDIN...");
    } else if (platform === 'instagram' || platform === 'tiktok') {
        try {
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            showToast("CAPTION & URL COPIED!");
        } catch(e) {}

        const target = platform === 'instagram' ? "https://www.instagram.com/" : "https://www.tiktok.com/upload";
        setTimeout(() => {
            window.open(target, '_blank');
        }, 1200);
    }
}

function closePopups() {
    screenshotOverlay.style.display = "none";
    planetPopup.style.display = "none";
    isPaused = false;
}

function downloadImage() {
    const link = document.createElement('a');
    link.download = `planet_discovery_${pName.innerText.toLowerCase()}.png`;
    link.href = previewImg.src;
    link.click();
    showToast("LOG SAVED TO GALLERY");
}

function showToast(msg) {
    toast.innerText = msg;
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 4000);
}

const sun = { x: 0, y: 0, radius: 110, mass: 65000, color: "#ff4d00", id: 'sun' };
const planets = [];
const planetColors = ["#555", "#8a6", "#46a", "#a44", "#a84", "#68a", "#84a", "#4a8", "#666"];

for (let i = 0; i < 9; i++) {
    planets.push({
        orbitRadius: 800 + i * 450,
        angle: Math.random() * Math.PI * 2,
        speed: 0.0015 / (i + 1),
        radius: 14 + i * 4,
        mass: 6000 + i * 3000,
        color: planetColors[i],
        hasFlag: false,
        x: 0, y: 0,
        id: 'p' + i,
        name: planetData[i].name,
        description: planetData[i].desc,
        icon: planetData[i].icon
    });
}

const player = new Player(0, -900);

function drawGrid(camera) {
    const size = 300;
    ctx.strokeStyle = "#121218";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = -camera.x % size; x < canvas.width; x += size) {
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
    }
    for (let y = -camera.y % size; y < canvas.height; y += size) {
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
}

function drawCosineRings(x, y, radius) {
    const time = Date.now() * 0.0015;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
        const baseRadius = radius + 25 + i * 35;
        const opacity = 0.35 - i * 0.06;
        ctx.strokeStyle = `rgba(255, 90, 0, ${opacity})`;
        ctx.beginPath();
        for (let a = 0; a < Math.PI * 2; a += 0.05) {
            const wave = Math.cos(a * 12 + time + i) * (6 + i * 2);
            const r = baseRadius + wave;
            const px = x + Math.cos(a) * r;
            const py = y + Math.sin(a) * r;
            if (a === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
    }
}

function update() {
    if (isPaused) return;
    planets.forEach(p => {
        p.angle += p.speed;
        p.x = sun.x + Math.cos(p.angle) * p.orbitRadius;
        p.y = sun.y + Math.sin(p.angle) * p.orbitRadius;
    });
    player.update(planets, sun);
}

function draw() {
    ctx.fillStyle = "#0a0a0c";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const camera = { x: player.x - canvas.width / 2, y: player.y - canvas.height / 2 };
    drawGrid(camera);
    ctx.setLineDash([2, 10]);
    ctx.strokeStyle = "#1a1c24";
    planets.forEach(p => {
        ctx.beginPath();
        ctx.arc(sun.x - camera.x, sun.y - camera.y, p.orbitRadius, 0, Math.PI * 2);
        ctx.stroke();
    });
    ctx.setLineDash([]);
    const sunX = sun.x - camera.x;
    const sunY = sun.y - camera.y;
    drawCosineRings(sunX, sunY, sun.radius);
    const gradient = ctx.createRadialGradient(sunX, sunY, sun.radius * 0.5, sunX, sunY, sun.radius);
    gradient.addColorStop(0, "#ff9d00");
    gradient.addColorStop(1, "#ff4d00");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(sunX, sunY, sun.radius, 0, Math.PI * 2);
    ctx.fill();
    planets.forEach(b => {
        const x = b.x - camera.x;
        const y = b.y - camera.y;
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(x, y, b.radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#aaa"; ctx.font = "10px Courier New"; ctx.textAlign = "center";
        ctx.fillText(b.name.toUpperCase(), x, y + b.radius + 20);
        if (b.hasFlag) {
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.beginPath();
            ctx.moveTo(x, y - b.radius); ctx.lineTo(x, y - b.radius - 14);
            ctx.lineTo(x + 10, y - b.radius - 10); ctx.lineTo(x, y - b.radius - 6);
            ctx.stroke();
        }
    });
    player.draw(ctx, camera);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
window.onload = loop;
</script>
</body>
